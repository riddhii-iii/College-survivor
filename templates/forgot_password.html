{% extends "base.html" %}
{% block content %}

<style>
    .reset-card {
        max-width: 520px;
        margin: 40px auto 0;
        background: var(--card-bg);
        color: var(--text-main);
        border-radius: 24px;
        padding: 30px;
        box-shadow: var(--shadow-strong);
    }

    .reset-card h2 {
        margin-top: 0;
        color: var(--primary);
    }

    .reset-card form {
        display: grid;
        gap: 16px;
    }

    .reset-card input {
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--divider-strong);
        background: var(--card-bg-strong);
        color: var(--text-main);
    }

    .reset-card .error {
        color: var(--danger);
        font-weight: 600;
        margin-bottom: 4px;
    }

    .reset-card a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="reset-card">
    <h2>Reset Password</h2>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Enter username" required>
        <input type="password" name="password" placeholder="New password" required>
        <button type="submit">Reset</button>
    </form>

    <p><a href="/login">Back to Login</a></p>
</div>

{% endblock %}
