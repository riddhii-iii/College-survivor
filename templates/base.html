<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ title or "College Survivor" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0F1C3F, #1A2A6C);
            --navbar-bg: rgba(15, 28, 63, 0.95);
            --card-bg: #F8F5E9;
            --card-bg-strong: #FFFFFF;
            --card-bg-soft: #E5DFCF;
            --text-main: #1A2A6C;
            --text-light: #F8F5E9;
            --text-muted: #6D7280;
            --accent: #FFD97D;
            --accent-hover: #FFCA4D;
            --primary: #1A2A6C;
            --primary-soft: rgba(26, 42, 108, 0.14);
            --primary-strong: #0F1C3F;
            --border-soft: rgba(26, 42, 108, 0.24);
            --divider: rgba(248, 245, 233, 0.24);
            --divider-strong: rgba(26, 42, 108, 0.18);
            --shadow-strong: 0 18px 40px rgba(0, 0, 0, 0.35);
            --shadow-soft: 0 8px 20px rgba(0, 0, 0, 0.12);
            --success: #2E7D32;
            --success-soft: #DDF3E4;
            --danger: #C0392B;
            --danger-soft: #F8D7DA;
            --warning: #A56A00;
            --warning-soft: #FCE8C3;
            --info-soft: #E3F2FD;
            --info-text: #1A2A6C;
            --surface-tint: rgba(255, 255, 255, 0.12);
        }

        body.theme-matcha {
            --bg-gradient: linear-gradient(135deg, #E8F5E9, #FDECEF);
            --navbar-bg: rgba(76, 175, 80, 0.95);
            --card-bg: #FFFFFF;
            --card-bg-strong: #FFF8FB;
            --card-bg-soft: #E8F5E9;
            --text-main: #2E2E2E;
            --text-light: #FFFFFF;
            --text-muted: #5E665E;
            --accent: #C2185B;
            --accent-hover: #AD1457;
            --primary: #2E7D32;
            --primary-soft: rgba(46, 125, 50, 0.1);
            --primary-strong: #1B5E20;
            --border-soft: rgba(46, 125, 50, 0.16);
            --divider: rgba(255, 255, 255, 0.55);
            --divider-strong: rgba(46, 125, 50, 0.14);
            --shadow-strong: 0 18px 40px rgba(34, 80, 45, 0.18);
            --shadow-soft: 0 8px 20px rgba(34, 80, 45, 0.1);
            --success: #2E7D32;
            --success-soft: #DDF3E4;
            --danger: #C2185B;
            --danger-soft: #F9D9E7;
            --warning: #A85A1E;
            --warning-soft: #F9E1CC;
            --info-soft: #E6F4EA;
            --info-text: #1B5E20;
            --surface-tint: rgba(255, 255, 255, 0.55);
        }

        body.theme-terracotta {
            --bg-gradient: linear-gradient(135deg, #8C3B2A, #C96A4A 58%, #E7C9A9);
            --navbar-bg: rgba(92, 42, 30, 0.9);
            --card-bg: #F5E9DA;
            --card-bg-strong: #FFF8F0;
            --card-bg-soft: #E8D2B8;
            --text-main: #4F2E23;
            --text-light: #FFF7EF;
            --text-muted: #7A5A4B;
            --accent: #E0A13B;
            --accent-hover: #C88A29;
            --primary: #A1492F;
            --primary-soft: rgba(161, 73, 47, 0.14);
            --primary-strong: #6F2E1E;
            --border-soft: rgba(111, 46, 30, 0.18);
            --divider: rgba(255, 247, 239, 0.4);
            --divider-strong: rgba(111, 46, 30, 0.16);
            --shadow-strong: 0 18px 40px rgba(74, 32, 22, 0.24);
            --shadow-soft: 0 8px 20px rgba(74, 32, 22, 0.14);
            --success: #5C7C37;
            --success-soft: #DDE7CF;
            --danger: #A63D2F;
            --danger-soft: #F1D3CC;
            --warning: #A86B1F;
            --warning-soft: #F4DFC2;
            --info-soft: #EED9C7;
            --info-text: #7A3E2B;
            --surface-tint: rgba(255, 248, 240, 0.3);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            padding: 20px 24px 40px;
            transition: background 0.4s ease;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            margin-bottom: 40px;
            background: var(--navbar-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: var(--shadow-strong);
        }

        .nav-left {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        .nav-left a {
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            transition: 0.2s ease;
        }

        .nav-left a:hover {
            color: var(--text-light);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .theme-switcher {
            padding: 6px 12px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
        }

        .logout {
            text-decoration: none;
            color: color-mix(in srgb, var(--danger) 75%, white);
            font-weight: 600;
        }

        .logout:hover {
            color: var(--text-light);
        }

        h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .card {
            position: relative;
            overflow: hidden;
            background: var(--card-bg);
            color: var(--text-main);
            border-radius: 20px;
            padding: 26px 30px;
            box-shadow: var(--shadow-strong);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.45);
        }

        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            border-radius: 20px 0 0 20px;
            background: var(--accent);
        }

        button,
        .btn {
            background: var(--accent);
            color: var(--text-main);
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s ease;
        }

        button:hover,
        .btn:hover {
            background: var(--accent-hover);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--primary-soft);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--accent), var(--text-main));
        }
    </style>
</head>
<body>
    {% if session.get("user_id") %}
    <div class="navbar">
        <div class="nav-left">
            <a href="/dashboard">Dashboard</a>
            <a href="/attendance">Attendance</a>
            <a href="/deadlines">Deadlines</a>
            <a href="/weekly-danger">Weekly Danger</a>
            <a href="/subjects">Subjects</a>
            <a href="/timetable">Timetable</a>
            <a href="/profile">Profile</a>
        </div>

        <div class="nav-right">
            <select id="themeSwitcher" class="theme-switcher">
                <option value="">Midnight and Vanilla</option>
                <option value="theme-matcha">Matcha and Cherry</option>
                <option value="theme-terracotta">Terracotta and Linen</option>
            </select>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </div>

    <hr style="border-color: var(--divider); margin-bottom: 30px;">
    {% endif %}

    {% block content %}{% endblock %}

    <script>
        const switcher = document.getElementById("themeSwitcher");

        function applyTheme(theme) {
            document.body.className = theme;
            localStorage.setItem("site-theme", theme);
        }

        if (switcher) {
            switcher.addEventListener("change", function () {
                applyTheme(this.value);
            });
        }

        window.addEventListener("DOMContentLoaded", function () {
            const savedTheme = localStorage.getItem("site-theme");
            const validThemes = ["", "theme-matcha", "theme-terracotta"];
            const themeToApply = validThemes.includes(savedTheme) ? savedTheme : "";

            document.body.className = themeToApply;

            if (savedTheme !== themeToApply) {
                localStorage.setItem("site-theme", themeToApply);
            }

            if (switcher) {
                switcher.value = themeToApply;
            }
        });
    </script>
</body>
</html>
